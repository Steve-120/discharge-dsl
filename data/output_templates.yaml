prevena:
  0_base: |-
    Prevena instructions:
    > The Prevena wound dressing should be left on for a total of 7 days post-operatively to receive the full benefit of the therapy. The date of Day # 7 should be written on a piece of tape on the canister to ensure that the nurse from the ___ or ___ facility knows when to remove the dressing and inspect the incision.  If the date is not written, please alert your nurse prior to discharge.
    > You may shower, but avoid getting the dressing and suction canister soiled or saturated.
    > You will be sent home with a shower bag to hold the suction canister while bathing.
    > If the dressing becomes soiled or saturated, turn the power off, remove the dressing, and discard the unit. Should this happen, please notify your ___ nurse, so they may make plans to see you the following day to assess your incision.
    > Once the Prevena dressing is removed, you may wash your incision daily with a plain white bar soap, such as Dove.
    > Do not apply any creams, lotions, or powders to your incision and monitor it daily.
    > If you notice any redness, swelling or drainage, please contact {cardiac_surgery_rep} at {cardiac_surgery_contact_info}.
shower:
  0_base:
    bath_type:
      SHOWER: "Please shower daily"
      BED_BATH: "Please bed bath daily"
      WASH: "Please wash daily"
  1_detail_clause:
