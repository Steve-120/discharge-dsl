      SIMPLE: ""
      STANDARD: " including washing incisions gently with mild soap"
  2_prevena_clause:
    is_prevena_used:
      "false": ""
      "true":
        reading_level:
          SIMPLE: ", after Prevena is removed"
          STANDARD: ", sternally after Prevena is removed"
  3_ending: ". Gently pat the wound dry, and do not rub."

