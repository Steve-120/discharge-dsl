alcohol:
  0_base: "Do not drink alcohol while taking narcotic pain medicine."

nsaid:
  0_base: >-
    Please DO NOT take any non-steroidal anti-inflammatory medications (NSAIDs such as celebrex,
    ibuprofen, advil, aleve, motrin, etc).

