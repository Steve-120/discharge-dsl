monitor_wound:
  0_base: >-
    Monitor wounds for signs of infection. These include redness, drainage, swelling, or increased pain.
    Should any of these symptoms occur, please contact {cardiac_surgery_rep} at {cardiac_surgery_contact_info}.

contact:
  0_base: "Please contact {cardiac_surgery_rep} at {cardiac_surgery_contact_info} with any questions or concerns."
  1_off_hours:
    reading_level:
      SIMPLE: ""
      STANDARD: " Answering service will contact on-call person during off-hours."

red_flags:
  0_base:
    reading_level:
      SIMPLE: ""
      DETAILED: >-
        Contact {cardiac_surgery_rep} at {cardiac_surgery_contact_info} or your local emergency number
        if you experience any of: chills, chest/abdominal pain, shortness of breath, nausea, vomiting,
        diarrhea, constipation, fainting, lightheadedness, yellowing of skin or eyes, decreased urine
        output, dark cloudy urine, swelling of abdomen or ankles, feeding tube becoming clogged or
        malpositioned.

